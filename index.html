<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سؤال مخصص لحفصة</title>
    <style>
        body {
            background-color: #fff0f5; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            direction: rtl;
        }

        .container {
            text-align: center;
            background: white;
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0px 15px 35px rgba(214, 51, 132, 0.15);
            max-width: 85%;
            width: 340px;
            transition: all 0.5s ease;
            z-index: 10;
        }

        h1 {
            color: #d63384;
            font-size: 26px;
            margin-top: 15px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .buttons {
            margin-top: 20px;
            position: relative;
            height: 60px;
            width: 100%;
        }

        button {
            font-size: 18px;
            font-weight: bold;
            padding: 12px 30px;
            border: none;
            border-radius: 50px; 
            cursor: pointer;
            position: absolute;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #yesBtn {
            background-color: #4caf50; 
            color: white;
            right: 15%;
        }

        #noBtn {
            background-color: #f44336; 
            color: white;
            left: 15%;
        }

        img {
            width: 200px;
            height: auto;
            object-fit: contain;
            border-radius: 15px;
        }

        /* شاشة النجاح والكلام */
        .success-screen {
            display: none;
            text-align: center;
            animation: fadeIn 0.8s ease forwards;
            z-index: 10;
        }

        .success-screen h2 {
            color: #ff477e;
            font-size: 26px;
            line-height: 1.6;
            margin-top: 20px;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* قلوب الانفجار الكبيرة أول ما تضغط نعم */
        .burst-heart {
            position: fixed;
            color: #ff477e;
            font-size: 35px;
            user-select: none;
            z-index: 9999;
            pointer-events: none;
            animation: explode 1.5s ease-out forwards;
        }

        @keyframes explode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(1.5);
                opacity: 0;
            }
        }

        /* القلوب الصغيرة اللطيفة المستمرة بالخلفية */
        .floating-heart {
            position: fixed;
            color: #ff477e;
            font-size: 18px;
            animation: floatUp 4s linear infinite;
            opacity: 0;
            z-index: 5;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <img src="https://images2.imgbox.com/39/b5/hNl5qT7V_o.png" alt="Cute Character Start">
    <h1>حفصة تحبيني؟ 😉❤️</h1>
    <div class="buttons">
        <button id="yesBtn" onclick="triggerLoveEffects()">نعم</button>
        <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">لا</button>
    </div>
</div>

<div class="success-screen" id="successScreen">
    <img src="https://images2.imgbox.com/08/96/Zgq088A5_o.png" alt="Cute Character Success">
    <h2>كنت عارف أصلاً! 😉❤️<br>حتى أنا احبك يا قلبي ✨</h2>
</div>

<script>
    // وظيفة هروب زر لا
    function moveButton() {
        const noBtn = document.getElementById('noBtn');
        const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40);
        const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40);
        
        noBtn.style.position = 'fixed';
        noBtn.style.left = x + 'px';
        noBtn.style.top = y + 'px';
    }

    // تشغيل التأثيرات عند الضغط على نعم
    function triggerLoveEffects() {
        // 1. تشغيل انفجار القلوب القوي فوراً لتغطية الشاشة
        createHeartBurst();

        // 2. إخفاء الشاشة الأولى وإظهار شاشة الكلام بعد ثانيتين من الانفجار
        setTimeout(() => {
            document.getElementById('mainContainer').style.display = 'none';
            document.getElementById('successScreen').style.display = 'block';
            
            // 3. تشغيل القلوب الصغيرة الهادئة بالخلفية باستمرار
            setInterval(createBackgroundHeart, 400);
        }, 1200);
    }

    // تأثير انفجار قلوب كثيرة تغطي الشاشة وتختفي بسرعه
    function createHeartBurst() {
        const totalHearts = 60; // عدد القلوب في الانفجار
        for (let i = 0; i < totalHearts; i++) {
            const heart = document.createElement('div');
            heart.classList.add('burst-heart');
            heart.innerText = '❤️';

            // تبدأ القلوب من منتصف الشاشة تقريباً لتنتشر للخارج
            heart.style.left = '50vw';
            heart.style.top = '50vh';

            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * 60 + 30; // مسافة الانتشار لتغطية الشاشة كامله
            const tx = Math.cos(angle) * distance + 'vmin';
            const ty = Math.sin(angle) * distance + 'vmin';

            heart.style.setProperty('--tx', tx);
            heart.style.setProperty('--ty', ty);
            heart.style.animationDelay = Math.random() * 0.1 + 's';

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 1500);
        }
    }

    // صنع قلوب صغيرة مستمرة تطلع كل شوي بالخلفية
    function createBackgroundHeart() {
        const heart = document.createElement('div');
        heart.classList.add('floating-heart');
        heart.innerText = '❤️';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
        document.body.appendChild(heart);
        
        setTimeout(() => {
            heart.remove();
        }, 4000);
    }
</script>

</body>
</html>
